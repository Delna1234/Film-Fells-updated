<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Film Feels | Sign Up</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css?family=IBM+Plex+Sans:400,500,600,700&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>

        body{
            margin:0;
            padding:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(rgba(0,0,0,.75),rgba(0,0,0,.75)),
            url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80");
            background-size:cover;
            background-position:center;
            font-family:'IBM Plex Sans',sans-serif;
        }

        .signup-card{

            width:100%;
            max-width:470px;

            background:rgba(0,0,0,.82);

            padding:35px;

            border-radius:15px;

            box-shadow:0 15px 40px rgba(0,0,0,.5);

            color:white;
        }

        .title{

            text-align:center;

            color:#e50914;

            font-weight:bold;

            margin-bottom:8px;
        }

        .subtitle{

            text-align:center;

            color:#cccccc;

            margin-bottom:25px;
        }

        .form-control{

            background:#222;

            border:1px solid #555;

            color:white;

            height:45px;

            border-radius:8px;
        }

        .form-control:focus{

            background:#222;

            color:white;

            border-color:#e50914;

            box-shadow:none;
        }

        label{

            font-weight:500;
        }

        .btn-register{

            background:#e50914;

            border:none;

            height:45px;

            font-weight:bold;

            border-radius:8px;
        }

        .btn-register:hover{

            background:#c40812;
        }

        .btn-login{

            background:transparent;

            border:2px solid #e50914;

            color:white;

            height:45px;

            font-weight:bold;

            border-radius:8px;
        }

        .btn-login:hover{

            background:#e50914;

            color:white;
        }

        .btn{

            margin-top:10px;
        }

    </style>

</head>

<body>

<div class="signup-card">

    <h2 class="title">FILM FEELS</h2>

    <p class="subtitle">Create Your Account</p>

    {% if error %}
    <div class="alert alert-danger">
        {{ error }}
    </div>
    {% endif %}

    {% if success %}
    <div class="alert alert-success">
        {{ success }}
    </div>
    {% endif %}

    <form method="POST" action="/signup">

        <div class="form-group">

            <label>Username</label>

            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Enter Username"
                required>

        </div>

        <div class="form-group">

            <label>Email</label>

            <input
                type="email"
                name="email"
                class="form-control"
                placeholder="Enter Email"
                required>

        </div>

        <div class="form-group">

            <label>Password</label>

            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Enter Password"
                required>

        </div>

        <div class="form-group">

            <label>Confirm Password</label>

            <input
                type="password"
                name="confirm_password"
                class="form-control"
                placeholder="Confirm Password"
                required>

        </div>

        <button type="submit" class="btn btn-register btn-block">
            Create Account
        </button>

        <a href="/login" class="btn btn-login btn-block">
            Back to Login
        </a>

    </form>

</div>

</body>
</html>
